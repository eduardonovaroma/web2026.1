<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        form {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #007acc;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #005a9c;
        }
        .required {
            color: red;
        }
    </style>
</head>
<body>
    
    <h1>Formulários</h1>
    <hr>

    <form action="/processar" method="post">
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="quantidade">Quantidade:</label>
            <input type="text" id="quantidade" name="quantidade" required>
        </div>

        <div>
            <label for="nascimento">Nascimento:</label>
            <input type="date" id="nascimento" name="nascimento" required>
        </div>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required>

        <label for="cidade">Cidade:</label>
        <select id="cidade" name="cidade">
            <option value="">Selecione</option>
            <option value="sp">São Paulo</option>
            <option value="rj">Rio de Janeiro</option>
            <option value="mg">Belo Horizonte</option>
        </select>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="5" cols="40"></textarea>

        <label>
            <input type="checkbox" name="aceite1" value="sim"> Aceito os termos e condições
        </label>

        <label>
            <input type="checkbox" name="aceite2" value="sim"> Enviar notificações
        </label>
        
        <label>
            <input type="radio" name="genero" value="m"> Masculino
        </label>
        <label>
            <input type="radio" name="genero" value="f"> Feminino
        </label>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form> 

</body>
</html>
